spring.application.name=Velora

# ==========================================
# DATABASE CONFIGURATION (SQL SERVER / SSMS)
# ==========================================
# S?A: S?p x?p l?i URL ng?n g?n, b? sendStringParametersAsUnicode l?i ép ki?u UUID
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=velora_db;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection pool (Hikari)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# B? SUNG QUAN TR?NG: Ép Hibernate 6 luôn map java.util.UUID thŕnh UNIQUEIDENTIFIER chu?n c?a SQL Server
spring.jpa.properties.hibernate.type.preferred_uuid_binary_strategy=CHAR

# B? SUNG QUAN TR?NG: C?u hěnh b?t bu?c ?? hi?n th? vŕ l?u ti?ng Vi?t chu?n hóa sang SSMS không b? l?i d?u h?i ch?m (?)
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# T?i ?u: T?t Open-In-View ?? gi?i phóng k?t n?i DB s?m
spring.jpa.open-in-view=false

# ==========================================
# FLYWAY MIGRATION
# ==========================================
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.encoding=UTF-8

# ==========================================
# MULTIPART & FILE UPLOAD
# ==========================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
upload.dir=${UPLOAD_DIR:./uploads}

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================
# SECURITY / JWT CONFIGURATION
# ==========================================
jwt.secret=${JWT_SECRET:VeloraSecretKey2025VeryLongSecretKeyForHS512AlgorithmMinimum64Chars}
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=2592000000

# ==========================================
# AI SERVICE (LM STUDIO & CHROMADB VIA PYTHON)
# ==========================================
ai.lm-studio.base-url=${LM_STUDIO_URL:http://localhost:1234}
ai.lm-studio.model=${LM_STUDIO_MODEL:local-model}
ai.lm-studio.max-tokens=2000
ai.lm-studio.temperature=0.7
ai.lm-studio.timeout-seconds=60

# Python AI Service (ChromaDB)
ai.chroma.base-url=${CHROMA_URL:http://localhost:8000}
ai.chroma.collection-name=velora_vectors

# ==========================================
# CORS & LOGGING CONFIGURATION
# ==========================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

logging.level.org.example.velora=DEBUG
logging.level.org.springframework.security=WARN
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# ==========================================
# SWAGGER / OPENAPI CONFIGURATION
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha