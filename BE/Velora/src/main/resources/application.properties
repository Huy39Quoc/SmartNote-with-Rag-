spring.application.name=Velora


spring.datasource.url=jdbc:mysql://localhost:1433/velora_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.encoding=UTF-8

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
upload.dir=${UPLOAD_DIR:./uploads}

server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

jwt.secret=${JWT_SECRET:VeloraSecretKey2025VeryLongSecretKeyForHS512AlgorithmMinimum64Chars}
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=2592000000

# Lấy model name từ: GET http://localhost:1234/v1/models
ai.lm-studio.base-url=${LM_STUDIO_URL:http://localhost:1234}
ai.lm-studio.model=${LM_STUDIO_MODEL:local-model}
ai.lm-studio.max-tokens=2000
ai.lm-studio.temperature=0.7
ai.lm-studio.timeout-seconds=60

# ── Python AI Service (ChromaDB) ─────────────────────────────────────────
ai.chroma.base-url=${CHROMA_URL:http://localhost:8000}
ai.chroma.collection-name=velora_vectors

# ── CORS ─────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.org.example.velora=DEBUG
logging.level.org.springframework.security=WARN
logging.charset.console=UTF-8
logging.charset.file=UTF-8
