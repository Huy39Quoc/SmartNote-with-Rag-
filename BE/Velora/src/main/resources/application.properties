spring.application.name=Velora

# ==========================================
# DATABASE CONFIGURATION (SQL SERVER / SSMS)
# ==========================================
# C?u hěnh URL chu?n k?t n?i SQL Server (Port 1433, b?t trustServerCertificate ?? bypass l?i mă hóa SSL c?c b?)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=velora_db;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection pool (Hikari)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
# 'update' giúp Hibernate t? sinh/c?p nh?t c?u hěnh b?ng NVARCHAR(MAX) m?i s?a vŕo SSMS.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# T?I ?U 1: ?ă xóa dňng spring.jpa.properties.hibernate.dialect theo c?nh báo log
# (Hibernate 6+ t? ??ng nh?n di?n dialect t?i ?u nh?t d?a tręn Driver URL).

# T?I ?U 2: T?t Open-In-View ?? gi?i phóng k?t n?i DB ngay sau khi r?i Service layer, tránh ngh?n Connection Pool
spring.jpa.open-in-view=false

# ==========================================
# FLYWAY MIGRATION
# ==========================================
# T?m th?i ?? false ?? Hibernate t? sinh c?u hěnh b?ng m?i cho kh?p.
# Khi DB ch?y m??t, b?n có th? chuy?n thŕnh true ?? qu?n lý phięn b?n script sql trong db/migration.
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.encoding=UTF-8

# ==========================================
# MULTIPART & FILE UPLOAD
# ==========================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
upload.dir=${UPLOAD_DIR:./uploads}

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================
# SECURITY / JWT CONFIGURATION
# ==========================================
jwt.secret=${JWT_SECRET:VeloraSecretKey2025VeryLongSecretKeyForHS512AlgorithmMinimum64Chars}
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=2592000000

# ==========================================
# AI SERVICE (LM STUDIO & CHROMADB VIA PYTHON)
# ==========================================
# L?y model name t?: GET http://localhost:1234/v1/models
ai.lm-studio.base-url=${LM_STUDIO_URL:http://localhost:1234}
ai.lm-studio.model=${LM_STUDIO_MODEL:local-model}
ai.lm-studio.max-tokens=2000
ai.lm-studio.temperature=0.7
ai.lm-studio.timeout-seconds=60

# Python AI Service (ChromaDB)
ai.chroma.base-url=${CHROMA_URL:http://localhost:8000}
ai.chroma.collection-name=velora_vectors

# ==========================================
# CORS & LOGGING CONFIGURATION
# ==========================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

logging.level.org.example.velora=DEBUG
logging.level.org.springframework.security=WARN
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# ==========================================
# SWAGGER / OPENAPI CONFIGURATION
# ==========================================
# ???ng d?n ?? xem giao di?n Swagger UI (M?c ??nh s? lŕ: http://localhost:8080/swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# S?p x?p các API theo th? t? b?ng ch? cái ho?c ph??ng th?c (GET, POST,...)
springdoc.swagger-ui.operationsSorter=alpha