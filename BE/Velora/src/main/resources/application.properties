spring.application.name=Velora

# ==========================================
# DATABASE CONFIGURATION (SQL SERVER / SSMS)
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}



spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# Connection pool (Hikari)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.type.preferred_uuid_binary_strategy=CHAR

spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.jpa.open-in-view=false

# ==========================================
# FLYWAY MIGRATION
# ==========================================
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.encoding=UTF-8

# ==========================================
# MULTIPART & FILE UPLOAD
# ==========================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
upload.dir=${UPLOAD_DIR:./uploads}

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================
# SECURITY / JWT CONFIGURATION
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=2592000000

# ==========================================
# AI SERVICE (LM STUDIO & CHROMADB VIA PYTHON)
# ==========================================
ai.lm-studio.base-url=${LM_STUDIO_URL}
ai.lm-studio.model=qwen2.5-3b-instruct
ai.lm-studio.temperature=0.2
ai.lm-studio.max-tokens=256
ai.lm-studio.timeout-seconds=180

# Python AI Service (ChromaDB)
ai.chroma.base-url=${CHROMA_URL}
ai.chroma.collection-name=velora_vectors

# ==========================================
# CORS & LOGGING CONFIGURATION
# ==========================================
cors.allowed-origins=http://localhost:5173,http://localhost:3000

logging.level.org.example.velora=DEBUG
logging.level.org.springframework.security=WARN
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# ==========================================
# SWAGGER / OPENAPI CONFIGURATION
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha

# ==========================================
# DEFAULT ADMIN ACCOUNT
# ==========================================
app.admin.email=admin@velora.local
app.admin.password=admin123
app.admin.full-name=Velora Admin
# ==========================================
# DEADLINE REMINDER JOB
# ==========================================
app.reminder.scan-delay-ms=60000