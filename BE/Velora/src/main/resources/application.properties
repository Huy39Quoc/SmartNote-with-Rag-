spring.application.name=Velora

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=velora_db;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.type.preferred_uuid_binary_strategy=CHAR

spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.encoding=UTF-8

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
upload.dir=${UPLOAD_DIR:./uploads}

server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

jwt.secret=${JWT_SECRET:velora-local-jwt-secret-key-please-change-this-1234567890}
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=2592000000

ai.lm-studio.base-url=${LM_STUDIO_URL:http://127.0.0.1:1234}
ai.lm-studio.model=${LM_STUDIO_MODEL:google/gemma-4-e4b}
ai.lm-studio.temperature=${LM_STUDIO_TEMPERATURE:0.1}
ai.lm-studio.max-tokens=${LM_STUDIO_MAX_TOKENS:4096}
ai.lm-studio.timeout-seconds=${LM_STUDIO_TIMEOUT_SECONDS:180}

ai.chroma.base-url=${CHROMA_URL:http://localhost:8000}
ai.chroma.collection-name=velora_vectors

cors.allowed-origins=http://localhost:5173,http://localhost:3000

logging.level.org.example.velora=DEBUG
logging.level.org.springframework.security=WARN
logging.charset.console=UTF-8
logging.charset.file=UTF-8

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha

app.admin.email=admin@velora.local
app.admin.password=admin123
app.admin.full-name=Velora Admin

app.reminder.scan-delay-ms=60000

vnpay.tmn-code=98CHR01Y
vnpay.hash-secret=1R1OOEO699YTSLJ2702QFI4UYN0BJTKL
vnpay.api-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.transaction-api-url=${VNPAY_TRANSACTION_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}

vnpay.return-url=http://localhost:5173/service-packages
vnpay.callback-url=http://localhost:8080/api/packages/vnpay-callback
